version: '3.8'
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: pepeju
      POSTGRES_PASSWORD: password
      POSTGRES_DB: accounting_db
    ports:
      - '5432:5432' # Mapea el puerto 5432 de Docker al puerto 5432 de tu máquina
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
