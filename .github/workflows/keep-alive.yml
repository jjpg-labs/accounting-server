name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          response=$(curl -s --max-time 30 https://api.jjpg.dev/health)
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"' || (echo "Health check failed" && exit 1)
